{% extends "base.html" %}

{% block content %}
<h2 class="mb-4 fw-bold">Dashboard</h2>

<div class="row g-4">

  <!-- Tile Template -->
  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">pH</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="ph_value">--</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">Turbidity</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="turbidity_value">--</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">Water Temperature</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="water_temp_value">--</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">TDS</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="tds_value">--</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">Air Temperature</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="air_temp_value">--</h2>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card custom-tile">
      <div class="card-body">
        <h5 class="sensor-name">Humidity</h5>
        <hr class="divider" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 class="sensor-reading" id="humidity_value">--</h2>
      </div>
    </div>
  </div>

</div>

<script>
  function fetchLatestData() {
    fetch('/get_latest_data')
      .then(response => response.json())
      .then(data => {
        if (!data.status) {
          document.getElementById('ph_value').innerText = data.ph !== null ? data.ph.toFixed(2) : '--';
          document.getElementById('turbidity_value').innerText = data.turbidity !== null ? data.turbidity.toFixed(2) : '--';
          document.getElementById('water_temp_value').innerText = data.temperature_water !== null ? data.temperature_water.toFixed(2) + ' °C' : '--';
          document.getElementById('tds_value').innerText = data.tds !== null ? data.tds.toFixed(2) + ' ppm' : '--';
          document.getElementById('air_temp_value').innerText = data.temperature_air !== null ? data.temperature_air.toFixed(2) + ' °C' : '--';
          document.getElementById('humidity_value').innerText = data.humidity_air !== null ? data.humidity_air.toFixed(2) + ' %' : '--';
        }
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });
  }

  fetchLatestData();
  setInterval(fetchLatestData, 5000);
</script>
{% endblock %}

{% block head %}
<style>
  .custom-tile {
    border: 1px solid #dce0e5;
    border-radius: 0;
    background-color: #ffffff;
    box-shadow: none;
    height: 200px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .sensor-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #4f8a8b;
    text-align: left;
    margin-bottom: 0.5rem;
  }

  .divider {
    border-top: 1px solid black;
    margin: 1rem 0;
  }

  .sensor-reading {
    font-size: 2rem;
    font-weight: 700;
    color: #333333;
    text-align: left;
    margin-top: 2rem;
  }
</style>
{% endblock %}
